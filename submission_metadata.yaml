ai_usage_summary: |
  Used AI assistance for code generation, debugging, UI implementation, and documentation.
  The ranking step itself makes no external AI/API calls and does not send candidate data to hosted LLMs.

methodology_summary: |
  Deterministic CPU-only ranker with hybrid lexical and structured scoring. The system
  combines technical evidence for retrieval/ranking/vector search/evaluation, production
  career history, title alignment, seniority band, India/logistics fit, and Redrob behavioral
  signals. It applies explicit penalties for keyword-stuffed side-project profiles, stale or
  unresponsive candidates, services-only backgrounds, suspicious skill claims, and logistics
  mismatch. The script streams candidates from JSONL and writes the required top-100 CSV
  with fact-grounded reasoning for each ranked candidate.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
